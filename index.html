<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Тестовое задание DevOps - интеграция с GREEN-API">
    <title>GREEN-API | DevOps Тестовое задание</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>GREEN-API</h1>

            </div>
            <!-- Две колонки -->
            <div class="two-columns">
                
                <!-- ЛЕВАЯ КОЛОНКА - Параметры подключения и кнопки -->
                <div class="left-column">
                    
                    <!-- Параметры подключения -->
                    <div class="section">
                        <div class="input-group">
                            <input type="text" id="idInstance" placeholder="idInstance" autocomplete="off">
                        </div>
                        <div class="input-group">
                            <input type="password" id="apiToken" placeholder="ApiTokenInstance" autocomplete="off">
                        </div>
                        <!-- Кнопки getSettings и getStateInstance под ApiTokenInstance -->
                        <div class="button-group">
                            <button class="btn btn-primary" id="btnGetSettings">getSettings</button>
                        </div>
                        <div class="button-group" style="margin-top: 8px;">
				<button class="btn btn-primary" id="btnGetState">getStateInstance</button>
                        </div>
                    </div>

                    <!-- Номер телефона-->
                    <div class="section">
                        <div class="input-group">
                            <input type="text" id="phoneNumber" placeholder="7XXXXXXXXXX (без +)" autocomplete="off">
                        </div>

                    <!-- Отправка текстового сообщения -->
                        <div class="input-group">
                            <textarea id="messageText" rows="3" placeholder="Введите текст сообщения...">Hello World!</textarea>
                        </div>
                        <!-- Кнопка sendMessage под текстовым полем -->
                        <div class="button-group">
                            <button class="btn btn-success" id="btnSendMessage">sendMessage</button>
                        </div>
                    </div>

                    <!-- Отправка файла -->
                    <div class="section">
                        <div class="input-group">
                            <input type="text" id="phoneNumberFile" placeholder="7XXXXXXXXXX (без +)" autocomplete="off">
                        </div>
                        <div class="input-group">
                            <input type="text" id="fileUrl" placeholder="https://example.com/image.jpg" autocomplete="off">
                        </div>
                        <!-- Кнопка sendFileByUrl под полем URL -->
                        <div class="button-group">
                            <button class="btn btn-success" id="btnSendFile">sendFileByUrl</button>
                        </div>
                    </div>
                </div>

                <!-- ПРАВАЯ КОЛОНКА - Результат -->
                <div class="right-column">
                    <div class="section" style="height: 100%; display: flex; flex-direction: column;">
                        <h3>Ответ:</h3>
			<div class="result-area" style="flex: 1;">
                            <pre id="resultOutput">Нажмите на любую кнопку, чтобы выполнить запрос...</pre>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Статус -->
            <div class="status-bar">
                <span id="statusIndicator" class="status-offline"></span>
                <span id="statusText">Не подключено</span>
            </div>
        </div>
    </div>  
    <script src="script.js"></script>
</body>
</html>
